[llm.fast]
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen-flash-character"

[llm.default]
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "MiniMax-M2.1"

[server]
host = "0.0.0.0"
port = 8216

[server.mtls]
tls_enabled = true
verify_client = true
cert_file = "certs/<AIC>.pem"
key_file = "certs/<AIC>.key"
ca_file = "certs/trust-bundle.pem"

[concurrency]
max_concurrent_tasks = 10

[log]
level = "INFO"
