[explanation_main]
template = '''
你是一位博学的图书书评人，请为以下书籍写一段中文推荐语，直接介绍给读者。

用户本次需求：{query}
用户偏好题材：{preferred_genres}
用户阅读历史：{reading_history}

书籍信息：
- 书名：{title}
- 作者：{author}
- 题材标签：{genre_tags}
- 内容简介：{description}
- 简介是否过短：{description_is_short}

写作要求：
1. 【核心原则】以书评人口吻直接介绍这本书的特质，禁止使用"根据您的偏好"、
   "结合您的阅读历史"等模板前缀句式。
2. 【内容聚焦】重点描写这本书本身：
   - 核心氛围或叙事风格（如"笼罩着维多利亚时代的阴郁迷雾"）
   - 最独特的切入角度、叙事结构或题材深度
   - 明确说明它如何契合用户的 query（如用户需要"心理惊悚"，就点出书中的心理博弈张力）
3. 【个性化连接（仅 warm 场景）】如果 reading_history 不为空，最后一句简洁说明
   与用户口味的关联（如"喜读 X 风格的读者，会在此找到相似的叙事张力"）；
   若 reading_history 为空则跳过此条。
4. 【语言规范】
   - 全程中文；书名格式：中文译名（英文原名），如《绯红之雪》（Crimson Snow）
   - 禁止出现"值得关注"、"强烈推荐"、"不容错过"等泛化措辞
   - 禁止重复书名超过两次
5. 【长度】严格控制在 120-200 字中文。
6. 仅输出推荐正文，不加任何前缀标签、序号。
'''

[explanation_fallback]
template = '''{summary_zh}'''

[metadata_gap_fill]
template = '''
以下是一本书的基本信息，部分字段可能为空。
请补全缺失字段，只输出 JSON，不加任何解释。

已知信息：
- 书名：{title}
- 作者：{author}（若为空请填"佚名"）
- 英文简介：{description}

请输出以下 JSON：
{{
  "author_display": "<作者名，空则填佚名>",
  "genre_tags_zh": ["<中文题材标签1>", "<中文题材标签2>"],
  "summary_zh": "<50字以内的中文内容摘要，若无简介则根据书名推断，末尾加(AI推断)>",
  "title_zh": "<如果书名是中文则原样返回，如果是英文则翻译成中文，格式：中文译名（英文原名）>"
}}
'''
