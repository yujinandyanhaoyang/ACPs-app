verify_client = true
cert_file = "certs/1.2.156.3088.0001.00001.4JLCAO.3D3JV0.1.11WY.pem"
key_file = "certs/1.2.156.3088.0001.00001.4JLCAO.3D3JV0.1.11WY.key"
