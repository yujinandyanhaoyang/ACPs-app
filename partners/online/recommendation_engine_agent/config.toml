CF_USER_INDEX_PATH       = "/root/WORK/DATA/processed/cf_user_id_index_v2.json"
ALS_MODEL_PATH           = "/root/WORK/DATA/processed/cf_item_factors_v2.npy"
HNSWLIB_PATH             = "/root/WORK/DATA/processed/cf_user_factors_v2.npy"

[llm]
model       = "qwen-plus"
temperature = 0.4
max_tokens  = 300

[ranking]
