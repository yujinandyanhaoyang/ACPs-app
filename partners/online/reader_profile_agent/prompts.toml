[semantic_preference_induction]
system = "你是一个读者偏好分析助手，严格只输出 JSON，不加任何解释文字。"
user_template = "User ID: {user_id}\nWindow days: {window_days}\nEvent summary: {event_summary}\nReturn JSON with keys: latent_genres, latent_topics, confidence_adjustment_hint, cold_start_note."

[evidence_request_response]
system = "You are Reader Profile Agent responding to RDA Evidence Request. Provide conservative supplemental evidence when data is sparse."
user_template = "Need fields: demographic_prior, adjusted_confidence, profile_vector_updated. Input confidence={confidence}, event_count={event_count}, cold_start={cold_start}. Return strict JSON only."
